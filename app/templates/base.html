<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="{{ page_id }}">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-secondary w-100">
    <a class="navbar-brand" href="{{ url_for('home') }}">Pump Management</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('home') }}">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('pumps.pumps') }}">Pumps</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('hydronics.hydronics') }}">Hydronics</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('hydraulic.hydraulic') }}">Hydraulic</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('admin.admin_dashboard') }}">Admin</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('quotes.view_quotes') }}">Quotes</a>
            </li>
        </ul>
    </div>
</nav>

<!-- Sidebar toggle button -->
<button id="sidebar-toggle" class="sidebar-toggle">
    <img src="{{ url_for('static', filename='images/sidebar-toggle-icon.png') }}" alt="Toggle Sidebar" style="width: 25px; height: 30px;">
</button>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('pumps.pumps') }}">Pumps</a>
    </li>
    <div id="pumps-sidebar" class="sidebar-content">
        <a class="nav-link" href="{{ url_for('pumps.add_pump_page') }}">Add Pump</a>
        <a class="nav-link" href="{{ url_for('pumps.view_historic_pumps') }}">View Pumps</a>
        <a class="nav-link" href="{{ url_for('pumps.search_pumps') }}">Search Pumps</a>
        <a class="nav-link" href="{{ url_for('pumps.manual_update_page') }}">Manual Update</a>
        <a class="nav-link" href="{{ url_for('pumps.tech_data_upload') }}">Tech Data Upload</a>
    </div>
    <div id="hydronics-sidebar" class="sidebar-content" style="display: none;">
        <a class="nav-link" href="{{ url_for('hydronics.buffer_tanks') }}">Buffer Tanks</a>
        <a class="nav-link" href="{{ url_for('hydronics.air_dirt_separators') }}">Air & Dirt Separators</a>
        <a class="nav-link" href="{{ url_for('hydronics.expansion_tanks') }}">Expansion Tanks</a>
    </div>
</div>

<div class="container mt-4">
    <div class="row">
        <!-- Main Content -->
        <div class="col-12 main-content no-sidebar inset-box">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
<script src="{{ url_for('static', filename='js/table.js') }}"></script>
</body>
</html>
