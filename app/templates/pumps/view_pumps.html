{% extends "base.html" %}

{% block title %}
    View Pumps
{% endblock %}

{% block content %}
<div class="container">
    <h2>View Pumps</h2>
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>Name</th>
                    <th>Flow</th>
                    <th>Head</th>
                    <th>Poles</th>
                    <th>Cost</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Data will be populated via JS -->
            </tbody>
        </table>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Fetch and populate table data
        fetch('{{ url_for("pumps.get_table_data", table_name="Pump_Details") }}')
            .then(response => response.json())
            .then(data => {
                const tableBody = document.getElementById('table-body');
                data.rows.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row.sku}</td>
                        <td>${row.name}</td>
                        <td>${row.flow_l_s}</td>
                        <td>${row.head_kpa}</td>
                        <td>${row.poles}</td>
                        <td>${row.cost}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            })
            .catch(error => console.error('Error fetching table data:', error));
    });
</script>
{% endblock %}
