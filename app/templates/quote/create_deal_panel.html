<div class="container">
    <form>
        <div class="form-group">
            <label for="dealName">Deal Name</label>
            <input type="text" class="form-control" id="dealName" placeholder="Enter deal name">
        </div>
        <div class="form-group">
            <label for="dealStage">Deal Stage</label>
            <select class="form-control" id="dealStage">
                <option>Sales Lead</option>
                <option>Qualification / Tender</option>
                <option>Proposal</option>
                <option>Negotiation</option>
                <option>Closed Won</option>
                <option>Closed Lost</option>
                <option>Abandoned</option>
            </select>
        </div>
        <div class="form-group">
            <label for="dealType">Deal Type</label>
            <select class="form-control" id="dealType">
                <option>HVAC Mechanical</option>
                <option>Hydraulic</option>
                <option>OEM</option>
                <option>Wholesaler</option>
                <option>Merchant</option>
            </select>
        </div>
        <div class="form-group">
            <label for="dealLocation">Deal Location</label>
            <select class="form-control" id="dealLocation">
                <option>Queensland</option>
                <option>New South Wales</option>
                <option>Victoria</option>
                <option>Australian Capital Territory</option>
                <option>Western Australia</option>
                <option>Northern Territory</option>
                <option>Tasmania</option>
            </select>
        </div>
        <div class="form-group">
            <label for="closeDate">Close Date</label>
            <input type="date" class="form-control" id="closeDate" value="{{ (current_date + timedelta(days=90)).strftime('%d/%m/%Y') }}">
        </div>
        <div class="form-group">
            <label for="contact">Contact</label>
            <select class="form-control" id="contact">
                <!-- Options will be dynamically loaded -->
            </select>
        </div>
        <div class="form-group">
            <label for="company">Company</label>
            <select class="form-control" id="company">
                <!-- Options will be dynamically loaded -->
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>
