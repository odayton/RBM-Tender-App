{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Quotes</h2>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Project ID</th>
                <th>Date Created</th>
                <th>Total Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for quote in quotes %}
            <tr>
                <td>{{ quote[0] }}</td>
                <td>{{ quote[1] }}</td>
                <td>{{ quote[2] }}</td>
                <td>{{ quote[3] }}</td>
                <td>
                    <a href="{{ url_for('quotes.quote_details', quote_id=quote[0]) }}" class="btn btn-info">View</a>
                    <a href="{{ url_for('quotes.edit_quote', quote_id=quote[0]) }}" class="btn btn-warning">Edit</a>
                    <form method="POST" action="{{ url_for('quotes.delete_quote', quote_id=quote[0]) }}" style="display:inline-block;">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
