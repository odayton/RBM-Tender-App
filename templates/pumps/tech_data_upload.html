{% extends "layout.html" %}

{% block title %}
    Tech Data Upload
{% endblock %}

{% block content %}
<div class="container">
    <h2>Tech Data Upload</h2>
    <form method="post" action="{{ url_for('pumps.tech_data_upload') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">Upload PDF File</label>
            <input type="file" class="form-control" id="file" name="file" required>
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
    </form>
</div>
{% endblock %}
